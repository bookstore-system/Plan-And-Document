# =============================================================================
#  docker-compose.dev.yml — Pull image đã build sẵn từ Docker Hub
# =============================================================================
#  Cách dùng:
#    cd Plan-And-Document
#    docker compose -f docker-compose.dev.yml pull
#    docker compose -f docker-compose.dev.yml up -d
#
#  Tắt:
#    docker compose -f docker-compose.dev.yml down
#
#  Xem log 1 service:
#    docker compose -f docker-compose.dev.yml logs -f user-service
#
#  File này tự động đọc biến từ Plan-And-Document/.env.
#  Override tag image bằng biến IMAGE_TAG (mặc định v1.0.0):
#    IMAGE_TAG=v1.1.0 docker compose -f docker-compose.dev.yml up -d
# =============================================================================

services:

  # =========================================================================
  # INFRASTRUCTURE
  # =========================================================================

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bookstore-network

  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookstore_user
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - user_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network
  book-db:
    image: mysql:8.0
    container_name: book-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookstore_book
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - book_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  news-db:
    image: mysql:8.0
    container_name: news-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookstore_news
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - news_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  promotion-db:
    image: mysql:8.0
    container_name: promotion-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookstore_promotion_db
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - promotion_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  review-db:
    image: mysql:8.0
    container_name: review-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookstore_review_db
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - review_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  user-redis:
    image: redis:7.2-alpine
    container_name: user-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bookstore-network

  cart-redis:
    image: redis:7.2-alpine
    container_name: cart-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - cart_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bookstore-network

  # =========================================================================
  # SERVICES
  # =========================================================================

  api-gateway:
    image: truongikpk/bookstore-api-gateway:${IMAGE_TAG:-v1.0.0}
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - bookstore-network

  user-service:
    image: truongikpk/bookstore-user-service:${IMAGE_TAG:-v1.0.0}
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://user-db:3306/bookstore_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_DATA_REDIS_HOST: user-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_JWT_PRIVATE_KEY: "${APP_JWT_PRIVATE_KEY}"
      APP_JWT_PUBLIC_KEY: "${APP_JWT_PUBLIC_KEY}"
      APP_JWT_EXPIRATION_MS: "${APP_JWT_EXPIRATION_MS}"
      APP_JWT_REFRESH_EXPIRATION_MS: "${APP_JWT_REFRESH_EXPIRATION_MS}"
    depends_on:
      user-db:
        condition: service_healthy
      user-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - bookstore-network

  book-service:
    image: truongikpk/bookstore-book-service:${IMAGE_TAG:-v1.0.0}
    container_name: book-service
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://book-db:3306/bookstore_book?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      book-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - bookstore-network

  cart-service:
    image: truongikpk/bookstore-cart-service:${IMAGE_TAG:-v1.0.0}
    container_name: cart-service
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: cart-redis
      REDIS_PORT: 6379
      BOOK_SERVICE_URL: http://book-service:8080
      USER_SERVICE_URL: http://user-service:8080
    depends_on:
      cart-redis:
        condition: service_healthy
    networks:
      - bookstore-network

  order-service:
    image: truongikpk/bookstore-order-service:${IMAGE_TAG:-v1.0.0}
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      USER_SERVICE_URL: http://user-service:8080
      BOOK_SERVICE_URL: http://book-service:8080
      CART_SERVICE_URL: http://cart-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      SHIPPING_SERVICE_URL: http://shipping-service:8080
      PROMOTION_SERVICE_URL: http://promotion-service:8080
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - bookstore-network

  payment-service:
    image: truongikpk/bookstore-payment-service:${IMAGE_TAG:-v1.0.0}
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ORDER_SERVICE_URL: http://order-service:8080
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - bookstore-network

  promotion-service:
    image: truongikpk/bookstore-promotion-service:${IMAGE_TAG:-v1.0.0}
    container_name: promotion-service
    restart: unless-stopped
    ports:
      - "8086:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://promotion-db:3306/bookstore_promotion_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
    depends_on:
      promotion-db:
        condition: service_healthy
    networks:
      - bookstore-network

  review-service:
    image: truongikpk/bookstore-review-service:${IMAGE_TAG:-v1.0.0}
    container_name: review-service
    restart: unless-stopped
    ports:
      - "8087:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://review-db:3306/bookstore_review_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_MVC_PATHMATCH_MATCHING_STRATEGY: ant_path_matcher
      USER_SERVICE_URL: http://user-service:8080
      BOOK_SERVICE_URL: http://book-service:8080
    depends_on:
      review-db:
        condition: service_healthy
    networks:
      - bookstore-network

  shipping-service:
    image: truongikpk/bookstore-shipping-service:${IMAGE_TAG:-v1.0.0}
    container_name: shipping-service
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GHN_API_URL: "${GHN_API_URL:-https://dev-online-gateway.ghn.vn/shiip/public-api}"
      GHN_API_TOKEN: "${GHN_API_TOKEN:-demo-token}"
      GHN_SHOP_ID: "${GHN_SHOP_ID:-0}"
      GHN_SHOP_NAME: "${GHN_SHOP_NAME:-Bookstore Shop}"
      GHN_SHOP_PHONE: "${GHN_SHOP_PHONE:-}"
      GHN_SHOP_ADDRESS: "${GHN_SHOP_ADDRESS:-}"
      GHN_SHOP_WARD: "${GHN_SHOP_WARD:-}"
      GHN_SHOP_DISTRICT: "${GHN_SHOP_DISTRICT:-}"
      GHN_SHOP_PROVINCE: "${GHN_SHOP_PROVINCE:-}"
      GHN_FROM_WARD_CODE: "${GHN_FROM_WARD_CODE:-}"
      GHN_FROM_DISTRICT_ID: "${GHN_FROM_DISTRICT_ID:-0}"
      GHN_FROM_PROVINCE_ID: "${GHN_FROM_PROVINCE_ID:-0}"
      GHN_DEFAULT_LENGTH: "${GHN_DEFAULT_LENGTH:-20}"
      GHN_DEFAULT_WIDTH: "${GHN_DEFAULT_WIDTH:-15}"
      GHN_DEFAULT_HEIGHT: "${GHN_DEFAULT_HEIGHT:-2}"
      GHN_DEFAULT_WEIGHT: "${GHN_DEFAULT_WEIGHT:-300}"
    networks:
      - bookstore-network

  news-service:
    image: truongikpk/bookstore-news-service:${IMAGE_TAG:-v1.0.0}
    container_name: news-service
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://news-db:3306/bookstore_news?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-}"
    depends_on:
      news-db:
        condition: service_healthy
    networks:
      - bookstore-network

  ai-service:
    image: truongikpk/bookstore-ai-service:${IMAGE_TAG:-v1.0.0}
    container_name: ai-service
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BOOK_SERVICE_URL: ${BOOK_SERVICE_URL:-}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-}
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    networks:
      - bookstore-network

  notification-service:
    image: truongikpk/bookstore-notification-service:${IMAGE_TAG:-v1.0.0}
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8091:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_RABBITMQ_HOST: rabbitmq
      USER_SERVICE_URL: http://user-service:8080
      SPRING_MAIL_HOST: "${SPRING_MAIL_HOST:-smtp.gmail.com}"
      SPRING_MAIL_PORT: "${SPRING_MAIL_PORT:-587}"
      SPRING_MAIL_USERNAME: "${SPRING_MAIL_USERNAME:-}"
      SPRING_MAIL_PASSWORD: "${SPRING_MAIL_PASSWORD:-}"
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - bookstore-network

# =============================================================================
# NETWORK & VOLUMES
# =============================================================================

networks:
  bookstore-network:
    external: true
    name: bookstore-network

volumes:
  user_mysql_data:
  book_mysql_data:
  news_mysql_data:
  promotion_mysql_data:
  review_mysql_data:
  cart_redis_data:
